<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APAS Loading</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: drag;
    }

    .splash-container {
      width: 540px;
      height: 420px;
      background: linear-gradient(135deg, #06061a 0%, #0d1033 25%, #0a0a2e 50%, #111145 75%, #0b0b28 100%);
      border-radius: 24px;
      border: 1px solid rgba(100, 140, 255, 0.15);
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.9), 0 0 60px rgba(60, 100, 255, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .splash-container::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 40%, rgba(80, 160, 255, 0.06) 0%, transparent 50%),
                  radial-gradient(circle at 70% 60%, rgba(120, 80, 255, 0.06) 0%, transparent 50%),
                  radial-gradient(circle at 50% 80%, rgba(0, 200, 150, 0.04) 0%, transparent 40%);
      animation: rotateGlow 10s linear infinite;
    }

    .splash-container::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(100, 160, 255, 0.03), transparent);
      animation: scanLine 4s ease-in-out infinite;
    }

    @keyframes rotateGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes scanLine {
      0% { left: -100%; }
      100% { left: 200%; }
    }

    .logo-wrapper {
      position: relative;
      z-index: 2;
      margin-bottom: 28px;
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      animation: logoAppear 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards, logoPulse 4s ease-in-out 1.2s infinite;
      opacity: 0;
      filter: drop-shadow(0 0 25px rgba(80, 140, 255, 0.6));
    }

    @keyframes logoAppear {
      0% { opacity: 0; transform: scale(0.3) rotate(-10deg); }
      60% { opacity: 1; transform: scale(1.05) rotate(2deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    @keyframes logoPulse {
      0%, 100% { filter: drop-shadow(0 0 25px rgba(80, 140, 255, 0.5)); transform: scale(1); }
      50% { filter: drop-shadow(0 0 40px rgba(80, 140, 255, 0.8)); transform: scale(1.02); }
    }

    /* Primary orbit ring */
    .orbit-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 140px;
      height: 140px;
      margin-top: -70px;
      margin-left: -70px;
      border: 2px solid transparent;
      border-top: 2px solid rgba(80, 180, 255, 0.7);
      border-right: 2px solid rgba(80, 180, 255, 0.3);
      border-radius: 50%;
      animation: orbitSpin 2s linear infinite;
    }

    .orbit-ring::after {
      content: '';
      position: absolute;
      top: -5px;
      right: 18px;
      width: 10px;
      height: 10px;
      background: radial-gradient(circle, #6cb4ff, #3b82f6);
      border-radius: 50%;
      box-shadow: 0 0 15px #50b4ff, 0 0 30px rgba(80, 180, 255, 0.4);
    }

    /* Secondary orbit ring */
    .orbit-ring-2 {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 125px;
      height: 125px;
      margin-top: -62.5px;
      margin-left: -62.5px;
      border: 1px solid transparent;
      border-bottom: 1px solid rgba(139, 92, 246, 0.5);
      border-left: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 50%;
      animation: orbitSpin 3s linear infinite reverse;
    }

    .orbit-ring-2::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 15px;
      width: 6px;
      height: 6px;
      background: radial-gradient(circle, #a78bfa, #7c3aed);
      border-radius: 50%;
      box-shadow: 0 0 10px #8b5cf6;
    }

    @keyframes orbitSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .app-name {
      position: relative;
      z-index: 2;
      font-size: 40px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 10px;
      margin-bottom: 8px;
      animation: textAppear 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
      opacity: 0;
      text-shadow: 0 0 30px rgba(80, 140, 255, 0.5), 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    @keyframes textAppear {
      0% { opacity: 0; transform: translateY(15px); letter-spacing: 20px; }
      100% { opacity: 1; transform: translateY(0); letter-spacing: 10px; }
    }

    .app-subtitle {
      position: relative;
      z-index: 2;
      font-size: 11px;
      color: rgba(180, 200, 255, 0.6);
      margin-bottom: 36px;
      animation: subtitleAppear 1s ease-out 0.8s forwards;
      opacity: 0;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    @keyframes subtitleAppear {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .loading-bar-container {
      position: relative;
      z-index: 2;
      width: 300px;
      height: 3px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 3px;
      overflow: hidden;
      animation: subtitleAppear 1s ease-out 1s forwards;
      opacity: 0;
    }

    .loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6, #06b6d4, #3b82f6);
      background-size: 300% 100%;
      border-radius: 3px;
      animation: loadProgress 3.5s ease-in-out forwards, shimmer 1.5s linear infinite;
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
    }

    @keyframes loadProgress {
      0% { width: 0%; }
      20% { width: 25%; }
      40% { width: 45%; }
      60% { width: 65%; }
      80% { width: 85%; }
      95% { width: 95%; }
      100% { width: 100%; }
    }

    @keyframes shimmer {
      0% { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    .loading-text {
      position: relative;
      z-index: 2;
      margin-top: 12px;
      font-size: 10px;
      color: rgba(150, 180, 255, 0.5);
      animation: subtitleAppear 1s ease-out 1.2s forwards;
      opacity: 0;
      letter-spacing: 1px;
    }

    .version-text {
      position: absolute;
      bottom: 16px;
      right: 20px;
      font-size: 10px;
      color: rgba(150, 170, 220, 0.3);
      z-index: 2;
    }

    /* Floating particles */
    .particle {
      position: absolute;
      background: rgba(100, 160, 255, 0.3);
      border-radius: 50%;
      z-index: 1;
    }

    .particle:nth-child(1) { width: 3px; height: 3px; top: 12%; left: 8%; animation: float 5s ease-in-out infinite; }
    .particle:nth-child(2) { width: 2px; height: 2px; top: 22%; right: 12%; animation: float 6s ease-in-out 1s infinite; }
    .particle:nth-child(3) { width: 4px; height: 4px; bottom: 28%; left: 15%; animation: float 7s ease-in-out 2s infinite; }
    .particle:nth-child(4) { width: 2px; height: 2px; top: 45%; right: 20%; animation: float 5.5s ease-in-out 0.5s infinite; }
    .particle:nth-child(5) { width: 3px; height: 3px; bottom: 18%; right: 8%; animation: float 6.5s ease-in-out 1.5s infinite; }
    .particle:nth-child(6) { width: 2px; height: 2px; top: 60%; left: 25%; animation: float 8s ease-in-out 3s infinite; background: rgba(139, 92, 246, 0.3); }
    .particle:nth-child(7) { width: 3px; height: 3px; bottom: 40%; right: 30%; animation: float 4.5s ease-in-out 0.8s infinite; background: rgba(6, 182, 212, 0.3); }
    .particle:nth-child(8) { width: 2px; height: 2px; top: 35%; left: 40%; animation: float 7.5s ease-in-out 2.5s infinite; }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.2; }
      50% { transform: translateY(-20px) scale(1.8); opacity: 0.8; }
    }

    /* Grid lines effect */
    .grid-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(100, 160, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100, 160, 255, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <div class="grid-overlay"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <div class="logo-wrapper">
      <img class="logo-img" src="icon.png" alt="APAS Logo">
      <div class="orbit-ring"></div>
      <div class="orbit-ring-2"></div>
    </div>

    <div class="app-name">APAS</div>
    <div class="app-subtitle">AI Projectile Analysis System</div>

    <div class="loading-bar-container">
      <div class="loading-bar"></div>
    </div>
    <div class="loading-text">جاري التحميل...</div>

    <div class="version-text">v1.0.0</div>
  </div>
</body>
</html>
