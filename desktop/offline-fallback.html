<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APAS - غير متصل</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #06061a 0%, #0d1033 30%, #0a0a2e 60%, #111145 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      color: #ffffff;
    }

    .container {
      text-align: center;
      max-width: 500px;
      padding: 40px;
    }

    .icon-wrapper {
      width: 120px;
      height: 120px;
      margin: 0 auto 32px;
      position: relative;
    }

    .icon-wrapper svg {
      width: 80px;
      height: 80px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.6;
    }

    .icon-ring {
      position: absolute;
      top: 0;
      left: 0;
      width: 120px;
      height: 120px;
      border: 2px solid rgba(139, 92, 246, 0.2);
      border-radius: 50%;
      animation: pulse-ring 3s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.1); opacity: 0.6; }
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 14px;
      color: rgba(180, 200, 255, 0.6);
      margin-bottom: 32px;
      line-height: 1.8;
    }

    .info-box {
      background: rgba(20, 20, 60, 0.6);
      border: 1px solid rgba(100, 140, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 28px;
    }

    .info-box p {
      font-size: 13px;
      color: rgba(180, 200, 255, 0.5);
      line-height: 1.8;
    }

    .retry-btn {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      border: none;
      padding: 14px 40px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 1px;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
    }

    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(59, 130, 246, 0.4);
    }

    .retry-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <div class="icon-ring"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(139, 92, 246, 0.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>

    <h1>غير متصل بالإنترنت</h1>
    <p class="subtitle">لا توجد نسخة محفوظة للاستخدام بدون اتصال</p>

    <div class="info-box">
      <p>يجب الاتصال بالإنترنت مرة واحدة على الأقل لحفظ التطبيق للاستخدام بدون اتصال.<br>اتصل بالإنترنت وافتح التطبيق بوضع Online لحفظ النسخة تلقائياً.</p>
    </div>

    <button class="retry-btn" onclick="window.location.reload()">إعادة المحاولة</button>
  </div>
</body>
</html>
